name: deepshield_ai
description: "TrueLens AI - AI-Powered Deepfake Detection Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  flutter_animate: ^4.5.2
  flutter_staggered_animations: ^1.1.1

  # State Management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # Charts
  fl_chart: ^0.70.2

  # Utilities
  intl: ^0.19.0
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  shared_preferences: ^2.5.3
  cached_network_image: ^3.4.1
  dio: ^5.9.2
  flutter_dotenv: ^6.0.1
  path_provider: ^2.1.6
  json_annotation: ^4.12.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  json_serializable: ^6.14.0
  build_runner: ^2.15.0

flutter:
  uses-material-design: true

  assets:
    - .env.dev
    - assets/images/
    - assets/icons/
